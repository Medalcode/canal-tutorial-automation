version: '3.8'

services:
  video-generator:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./output:/app/output
      - ./scripts:/app/scripts
      - ./.jobs:/app/.jobs
      - ./web:/app/web
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  video_data:
